<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בנימינה - גבעת עדה</title>

    <script type="text/javascript">

        const startTime = Date.parse("2026-02-28 06:00:00 GMT") / 1000;
        const city1name = "בנימינה";
        const city2name = "גבעת עדה";

        function loadScores() {
            fetch("https://api.codetabs.com/v1/proxy?quest=https://www.tzevaadom.co.il/static/historical/all.json").then(
                t => t.json()
            ).then(
                t => {
                    t = t.map(
                        t => {
                            let [alertId, threat, cities, time] = t;
                            return {
                                alertId: alertId,
                                threat: threat,
                                cities: cities,
                                time: time
                            }
                        }
                    ).filter(t => t.time > startTime).reduce(
                        (a, t) => {
                            if (t.cities.includes(city1name))
                                a[0] += 1;

                            if (t.cities.includes(city2name))
                                a[1] += 1;

                            return a;
                        }, [0, 0]);

                    document.getElementById('score1').innerText = t[0];
                    document.getElementById('score2').innerText = t[1];

                    document.getElementById('loader').style.opacity = 0;

                    setTimeout(() => {

                        document.getElementById('loader').style.display = 'none';
                        document.getElementsByTagName('body')[0].classList.remove('loading');

                        setTimeout(() => {
                            document.getElementsByTagName('body')[0].classList.remove('rendering');
                        }, 2000);

                    }, 1000);

                }
            );
        }

    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow-x: hidden;

            background:
                radial-gradient(circle at center, rgba(255, 255, 255, 0.15), transparent 60%),
                linear-gradient(135deg, #1e3c72, #2a5298, #6dd5ed);

            animation: pageFade 1.5s ease-out;
        }


        /* rocket layer */

        .rockets {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 2;
        }

        .rocket {
            position: absolute;
            font-size: 40px;
            opacity: 1;
        }

        .rocket.ltr>p {
            rotate: 42deg;
        }

        .rocket.rtl>p {
            rotate: 228deg;
        }

        /* LEFT → RIGHT */

        .rocket.ltr {
            left: -70px;
            animation: rocketLTR 14s linear infinite;
        }

        /* RIGHT → LEFT */

        .rocket.rtl {
            right: -70px;
            animation: rocketRTL 14s linear infinite;
        }

        /* spacing and timing */

        .rocket:nth-child(1) {
            top: 30%;
            animation-delay: 1.5s;
        }

        .rocket:nth-child(2) {
            top: 55%;
            animation-delay: 5s;
        }

        .rocket:nth-child(3) {
            top: 70%;
            animation-delay: 8.5s;
        }

        .rocket:nth-child(4) {
            top: 45%;
            animation-delay: 12s;
        }


        /* LEFT → RIGHT trajectory */

        @keyframes rocketLTR {

            0% {
                transform: translateX(0) translateY(0) rotate(-15deg);
            }

            10% {
                transform: translateX(12vw) translateY(-50.4px) rotate(-12deg);
            }

            20% {
                transform: translateX(24vw) translateY(-89.6px) rotate(-9deg);
            }

            30% {
                transform: translateX(36vw) translateY(-117.6px) rotate(-6deg);
            }

            40% {
                transform: translateX(48vw) translateY(-134.4px) rotate(-3deg);
            }

            45% {
                transform: translateX(54vw) translateY(-138.6px) rotate(-1.5deg);
            }

            48% {
                transform: translateX(57.6vw) translateY(-139.7px) rotate(-0.6deg);
            }

            50% {
                transform: translateX(60vw) translateY(-140px) rotate(0deg);
            }

            52% {
                transform: translateX(62.4vw) translateY(-139.78px) rotate(0.6deg);
            }

            55% {
                transform: translateX(66vw) translateY(-138.6px) rotate(1.5deg);
            }

            60% {
                transform: translateX(72vw) translateY(-134.4px) rotate(3deg);
            }

            70% {
                transform: translateX(84vw) translateY(-117.6px) rotate(6deg);
            }

            80% {
                transform: translateX(96vw) translateY(-89.6px) rotate(9deg);
            }

            90% {
                transform: translateX(108vw) translateY(-50.4px) rotate(12deg);
            }

            100% {
                transform: translateX(120vw) translateY(0px) rotate(15deg);
            }

        }


        /* RIGHT → LEFT trajectory */

        @keyframes rocketRTL {

            0% {
                transform: translateX(0) translateY(0) rotate(15deg);
            }

            10% {
                transform: translateX(-12vw) translateY(-50.4px) rotate(12deg);
            }

            20% {
                transform: translateX(-24vw) translateY(-89.6px) rotate(9deg);
            }

            30% {
                transform: translateX(-36vw) translateY(-117.6px) rotate(6deg);
            }

            40% {
                transform: translateX(-48vw) translateY(-134.4px) rotate(3deg);
            }

            45% {
                transform: translateX(-54vw) translateY(-138.6px) rotate(1.5deg);
            }

            48% {
                transform: translateX(-57.6vw) translateY(-139.7px) rotate(0.6deg);
            }

            50% {
                transform: translateX(-60vw) translateY(-140px) rotate(0deg);
            }

            52% {
                transform: translateX(-62.4vw) translateY(-139.78px) rotate(-0.6deg);
            }

            55% {
                transform: translateX(-66vw) translateY(-138.6px) rotate(-1.5deg);
            }

            60% {
                transform: translateX(-72vw) translateY(-134.4px) rotate(-3deg);
            }

            70% {
                transform: translateX(-84vw) translateY(-117.6px) rotate(-6deg);
            }

            80% {
                transform: translateX(-96vw) translateY(-89.6px) rotate(-9deg);
            }

            90% {
                transform: translateX(-108vw) translateY(-50.4px) rotate(-12deg);
            }

            100% {
                transform: translateX(-120vw) translateY(0px) rotate(-15deg);
            }

        }


        /* intro animation */

        @keyframes pageFade {
            from {
                opacity: 0;
                transform: scale(1.05);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        header {
            text-align: center;
            padding: 50px 10px;
            font-size: 4.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        footer {
            text-align: center;
            padding: 70px 10px;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        /* layout */

        .content {
            direction: rtl;
            height: 100%;
            animation: pageFade 1.5s ease-out;
        }

        .content:before {
            content: "";
            position: fixed;
            left: 0;
            right: 0;
            bottom:-30px;
            z-index: -1;
            background-image: url('https://iili.io/qApAZuf.png');
            background-repeat: no-repeat;
            background-position: bottom;
            height: 100%;
            filter: opacity(0.5);
        }  

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 70px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* loading */
        .rendering {
            overflow:hidden !important;
        }

        .loading>.content{
            display: none;
        }

        .loader {
            width: 175px;
            height: 80px;
            display: block;
            margin: auto;
            background-image: radial-gradient(circle 25px at 25px 25px, #FFF 100%, transparent 0), radial-gradient(circle 50px at 50px 50px, #FFF 100%, transparent 0), radial-gradient(circle 25px at 25px 25px, #FFF 100%, transparent 0), linear-gradient(#FFF 50px, transparent 0);
            background-size: 50px 50px, 100px 76px, 50px 50px, 120px 40px;
            background-position: 0px 30px, 37px 0px, 122px 30px, 25px 40px;
            background-repeat: no-repeat;
            position: relative;
            box-sizing: border-box;
            transition: opacity 1s ease-in-out;
        }

        .loader::after {
            content: '';
            left: 0;
            right: 0;
            margin: auto;
            bottom: 20px;
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 5px solid transparent;
            border-color: #575fcfbd transparent;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* teams */

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: teamEnter 1.2s ease forwards;
        }

        .team:first-child {
            transform: translateX(80px);
        }

        .team:last-child {
            transform: translateX(-80px);
        }

        @keyframes teamEnter {
            to {
                transform: translateX(0);
            }
        }

        .team img {
            width: 300px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
        }

        .team1 img {
            width: 320px;
        }

        .team-name {
            font-size: 2.4rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* score */

        .score {
            font-size: 7rem;
            font-weight: 900;
            letter-spacing: 10px;
            text-align: center;
            white-space: nowrap;

            animation:
                scoreEnter 1.5s ease-out,
                glow 2.5s ease-in-out infinite alternate;
        }

        @keyframes scoreEnter {
            from {
                transform: scale(0.3);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes glow {
            from {
                text-shadow:
                    0 0 10px rgba(255, 255, 255, 0.6),
                    0 0 20px rgba(255, 255, 255, 0.5),
                    0 0 40px rgba(255, 255, 255, 0.4);
            }

            to {
                text-shadow:
                    0 0 20px rgba(255, 255, 255, 1),
                    0 0 40px rgba(255, 255, 255, 0.9),
                    0 0 80px rgba(255, 255, 255, 0.7);
            }
        }

        /* avoid line break where not wanted */

        .avoidwrap {
            display: inline-block;
        }

        /* blinking dot */

        .blinking-dot {
            background: red;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-left: -5px;
            animation: 2s blink ease infinite;
        }

        @keyframes blink {

            from,
            to {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }

        /* mobile layout */

        @media (max-width:1000px) {

            .content:before{
                background-size:contain;
                bottom:-15px;
            }

            .rocket {
                animation-duration: 6s !important;
            }

            .container {
                flex-direction: row;
                gap: 25px;
                flex-wrap: wrap;
                padding-top: 40px;
            }

            .team {
                flex-basis: calc(50% - 12.5px);
            }

            .team img {
                width: 130px;
            }

            .team1 img {
                width: 145px;
            }

            .team-name {
                font-size: 1.4rem;
            }

            .score {
                font-size: 4rem;
                letter-spacing: 5px;
                order: 3;
            }

            header {
                font-size: 2.6rem;
            }

            footer {
                font-size: 1.2rem;
            }

            .blinking-dot {
                width: 4px;
                height: 4px;
            }

        }
    </style>
</head>

<body onload="loadScores()" class="loading rendering">

    <div id="loader" class="loader"></div>

    <div class="content">


        <div class="rockets">
            <div class="rocket ltr">
                <p>🚀</p>
            </div>
            <div class="rocket rtl">
                <p>🚀</p>
            </div>
            <div class="rocket ltr">
                <p>🚀</p>
            </div>
            <div class="rocket rtl">
                <p>🚀</p>
            </div>
        </div>

        <header>
            הדרבי הגדול
        </header>


        <div class="container">

            <div class="team team1">
                <img src="https://iili.io/qApADZl.png" alt="סמל בנימינה">
                <div class="team-name">בנימינה</div>
            </div>

            <div class="score">
                <span id="score1"></span> : <span id="score2"></span>
            </div>

            <div class="team team2">
                <img src="https://iili.io/qApAtj4.png" alt="סמל גבעת עדה">
                <div class="team-name">גבעת עדה</div>
            </div>

        </div>

        <footer>

            <div class="blinking-dot"></div>

            <span>תוצאות בזמן אמת מאליפות</span>
            <span class="avoidwrap">ליגת שאגת הארי</span>

        </footer>

    </div>

</body>

</html>
